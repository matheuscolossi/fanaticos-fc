<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento em confirmação — Fanáticos Mantos</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32.png" />
  <link rel="stylesheet" href="../styles/global.css?v=20260717-responsive" />
  <link rel="stylesheet" href="../styles/loja.css?v=20260717-responsive" />
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('fc_theme') || 'dark');</script>
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="../index.html" class="logo"><span class="logo__text">FANÁTICOS <em>MANTOS</em></span></a>
      <nav class="nav"><a href="../index.html" class="nav__link">Loja</a><a href="conta.html" class="nav__link">Minha Conta</a></nav>
    </div>
  </header>
  <main class="container" style="min-height:70vh;display:grid;place-items:center;padding-top:5rem;padding-bottom:5rem">
    <section class="modal" style="width:min(100%,560px);padding:2rem;text-align:center">
      <div id="pagamentoStatusIcon" style="font-size:3rem;margin-bottom:1rem">⏳</div>
      <h1 id="pagamentoStatusTitle" style="margin-bottom:.75rem">Confirmando seu pagamento</h1>
      <p id="pagamentoStatusText" style="color:var(--text-muted);line-height:1.7">Estamos aguardando a confirmação segura do Stripe. Não feche esta página.</p>
      <p id="pagamentoOrder" style="margin-top:1rem;font-weight:600"></p>
      <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem">
        <a href="conta.html" class="btn btn--primary">Ver meus pedidos</a>
        <a href="../index.html" class="btn btn--outline">Voltar à loja</a>
      </div>
    </section>
  </main>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/pagamento.js"></script>
</body>
</html>
